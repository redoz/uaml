services:
  - type: web
    name: owox-model-canvas
    runtime: node
    plan: starter
    # corepack provides pnpm (version pinned via package.json "packageManager")
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm --filter @mc/server start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # AI "Insight Questions" key. Without it the Business Goal nav still shows,
      # but the panel shows a graceful "AI not enabled" note instead of
      # generating. Not inherited by preview/branch deploys → AI is off there.
      - key: GEMINI_API_KEY
        sync: false
      # PostHog project token (public). Inlined into the web build by Vite at
      # build time, so it must be present in the build environment. Unset in
      # preview deploys → analytics stays off there.
      - key: VITE_POSTHOG_KEY
        sync: false
